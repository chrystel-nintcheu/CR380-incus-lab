#cloud-config
# =============================================================================
# CR380 - Cloud-Init: Ready VM (Incus pre-installed + initialized)
# =============================================================================
#
# FR: Configuration cloud-init pour une VM pré-configurée. Incus est installé
#     et initialisé avec 'incus admin init --minimal'. L'étudiant peut
#     commencer directement aux labs avancés (images, conteneurs, etc.).
#
# EN: Cloud-init configuration for a pre-configured VM. Incus is installed
#     and initialized with 'incus admin init --minimal'. The student can
#     start directly at advanced labs (images, containers, etc.).
#
# Usage (multipass):
#   multipass launch 24.04 --name cr380-lab --cpus 2 --memory 4G --disk 20G \
#       --cloud-init cloud-init/user-data-ready.yaml
#
# Usage (Proxmox):
#   Set this as the cloud-init user-data snippet for a VM template.
# =============================================================================

# System settings
hostname: cr380-lab
manage_etc_hosts: true
timezone: America/Montreal

# Packages to install
package_update: true
package_upgrade: true
packages:
  - git
  - curl
  - wget
  - tree
  - vim
  - jq
  - members
  - ca-certificates
  - gnupg
  - software-properties-common
  - apt-transport-https
  - bash-completion
  - incus

# Users
users:
  - name: student
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    groups: [sudo, incus-admin]
    lock_passwd: false
    # CHANGE THIS: Replace with your SSH public key or set a password
    # ssh_authorized_keys:
    #   - ssh-rsa AAAA... your-key-here

# Set a default password (change in production!)
chpasswd:
  list: |
    student:cr380lab
  expire: false

# Run commands after boot
runcmd:
  # Initialize Incus with minimal config
  - incus admin init --minimal
  # Clone the lab test suite
  - su - student -c "git clone https://github.com/CHANGE-ME/incus-lab.git /home/student/incus-lab || true"
  - echo "CR380 Ready VM. Incus installed + initialized. Start at lab 05+." > /etc/motd
